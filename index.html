<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學與地球內部結構 - Chapter 3</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Highlight.js for code formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Seismology</h2>
                <p>Chapter 3: Earth Structure</p>
            </div>
            <ul class="nav-links" id="navLinks">
                <!-- Navigation items will be generated here by JS -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <section class="hero">
                <div class="hero-content">
                    <h1>地震波與地球內部結構</h1>
                    <p id="heroSubtitle">探索地球深處的奧秘</p>
                </div>
            </section>

            <div class="content-wrapper">
                <div class="markdown-body" id="contentBody">
                    <!-- Markdown content will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <!-- Load data -->
    <script src="./data.js"></script>
    
    <script>
        const qaData = [
            { chapter: "3.1 Introduction", question: "P波與S波進入液態的外核時，會發生什麼變化？", answer: "S波無法在液態的外核中傳播，而P波的波速會急遽下降。這些觀測到的波速變化，是我們建立核函邊界 (Core-Mantle Boundary) 兩側物質物理性質與化學成分模型的主要直接證據。" },
            { chapter: "3.2 Refraction Seismology", question: "在震測折射法中，如果地下存在「低速帶」，會產生什麼問題？", answer: "如果存在低速帶（下層波速低於上層波速），地震波將無法在該介面產生臨界折射。這會導致地表無法接收到來自該層的頭波（Head wave），形成所謂的「隱藏層 (Hidden Layer)」或「折射盲區」，進而使研究者高估下方地層的實際深度。" },
            { chapter: "3.3 Reflection Seismology", question: "什麼是正常時差 (Normal Moveout, NMO)？", answer: "正常時差 (NMO) 是指同一個水平反射面，在不同震央距的接收站所觀測到的走時差異。透過 NMO 校正，可以將所有的反射走時平移至相當於垂直反射的走時，不僅能將信號疊加增強，更能藉此精準估算出地層的波速。" },
            { chapter: "3.4 Spherical Earth", question: "在球狀地球模型中，射線參數 (Ray Parameter, p) 的定義與其物理意義為何？", answer: "射線參數定義為 <strong>p = (r × sin i) / v</strong>。根據史奈爾定律的球體推廣，對於一條給定的地震射線，在其整個傳播路徑上，射線參數 p 是一個常數（守恆量），這是追跡地震波在地球內部傳播軌跡的核心基礎。" },
            { chapter: "3.5 Body wave studies", question: "什麼是「三分支效應 (Triplication)」，它在地震圖上有什麼特徵？", answer: "三分支效應是由於地球內部（特別是上部地函）存在波速隨深度急遽增加的過渡帶（如相變面），導致不同射線參數的波在相似的震央距同時抵達。這使得走時曲線在圖形上呈現倒折的 'Z' 字型，並在地表觀測到多重抵達相 (Multiple Arrivals)。" },
            { chapter: "3.6 Anisotropic structure", question: "「剪力波分裂 (Shear-wave Splitting)」能告訴我們地球內部的什麼資訊？", answer: "當剪力波穿過非等向性介質時，會分裂成兩個偏振方向垂直、且波速不同的獨立波（快波與慢波）。這種現象可以用來推斷地函礦物（如橄欖石）的晶格優選取向 (LPO)，進而了解地函對流的方向；或在地殼中用來識別裂隙的排列方向。" },
            { chapter: "3.7 Attenuation", question: "地震學中描述介質「衰減」的參數是什麼？它代表什麼意義？", answer: "描述衰減的參數是「品質因子 (Quality Factor, Q)」。Q 值越高，代表介質的非彈性衰減越小（震波能量保存得越好）；Q 值越低，代表每一週期內散失為熱能的能量比例越高。常見的高溫軟流圈通常具有較低的 Q 值。" },
            { chapter: "3.8 Mantle & Core", question: "我們如何確切知道地核主要由鐵和鎳組成？", answer: "科學家將地震波測量得到的地核波速與密度分佈，與高溫高壓物理實驗下各類金屬與矽酸鹽的狀態方程式進行比對。結果發現，只有鐵鎳合金在高壓下的密度與彈性波速特性，能完美吻合地核的觀測結果。" },
            { chapter: "3.10 Problems", question: "在全球走時曲線分析中，如何運用 Benndorf 關係式？", answer: "Benndorf 關係式指出，地表走時曲線的斜率 (dT/dΔ) 就等於該射線的射線參數 p。因此，我們只需測量觀測走時曲線的斜率，就能利用 <strong>p = (r₀ × sin i₀) / v₀</strong> 反推出地震波抵達地表的出射角，這是解開地球反演問題的關鍵步驟。" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Configure marked with highlight.js
            marked.setOptions({
                highlight: function(code, lang) {
                    const language = highlight.getLanguage(lang) ? lang : 'plaintext';
                    return highlight.highlight(code, { language }).value;
                },
                langPrefix: 'hljs language-',
                breaks: true,
                gfm: true
            });

            const navLinksContainer = document.getElementById('navLinks');
            const contentBody = document.getElementById('contentBody');
            const heroSubtitle = document.getElementById('heroSubtitle');
            const mobileToggle = document.getElementById('mobileToggle');
            const sidebar = document.getElementById('sidebar');

            // Handle mobile menu toggle
            mobileToggle.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });

            // If pageData is not loaded properly
            if (typeof pageData === 'undefined' || pageData.length === 0) {
                contentBody.innerHTML = '<h2>錯誤：無法載入內容資料。</h2><p>請確認 data.js 是否已正確生成。</p>';
                return;
            }

            // Generate Navigation
            pageData.forEach((page, index) => {
                const li = document.createElement('li');
                li.className = 'nav-item';
                if (index === 0) li.classList.add('active');
                if (page.isQA) li.classList.add('qa-tab');
                
                const iconSvg = page.isQA 
                    ? `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`
                    : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`;
                
                li.innerHTML = `${iconSvg} <span>${page.title}</span>`;
                li.dataset.index = index;
                
                li.addEventListener('click', () => {
                    // Update active state
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    
                    // Render content
                    renderContent(index);
                    
                    // Close sidebar on mobile
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                    }
                    
                    // Scroll to top
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                
                navLinksContainer.appendChild(li);
            });

            // Function to render Q&A Section dynamically
            function renderQA() {
                const qaContainer = document.getElementById('qa-section-container');
                if (!qaContainer) return;
                
                qaContainer.innerHTML = `
                    <div class="qa-controls">
                        <button class="btn" id="expandAll">展開所有解答</button>
                        <button class="btn btn-secondary" id="collapseAll">蓋上所有卡片</button>
                        <button class="btn" id="shuffle">隨機打亂題目</button>
                    </div>
                    <div class="qa-grid" id="qaGrid"></div>
                `;
                
                function drawCards(dataArray) {
                    const grid = document.getElementById('qaGrid');
                    grid.innerHTML = '';
                    dataArray.forEach((item, index) => {
                        const scene = document.createElement('div');
                        scene.className = 'card-scene';
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.onclick = () => card.classList.toggle('is-flipped');

                        card.innerHTML = `
                            <div class="card-face card-front">
                                <span class="chapter-badge">${item.chapter}</span>
                                <div class="question-icon">💡</div>
                                <h3 class="question-text">${item.question}</h3>
                                <div class="click-hint">點擊翻牌查看解答</div>
                            </div>
                            <div class="card-face card-back">
                                <div class="answer-title">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>
                                    解答
                                </div>
                                <div class="answer-text">${item.answer}</div>
                            </div>
                        `;
                        scene.appendChild(card);
                        grid.appendChild(scene);
                    });
                }
                
                drawCards(qaData);
                
                document.getElementById('expandAll').addEventListener('click', () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.add('is-flipped'));
                });
                document.getElementById('collapseAll').addEventListener('click', () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('is-flipped'));
                });
                document.getElementById('shuffle').addEventListener('click', () => {
                    drawCards([...qaData].sort(() => Math.random() - 0.5));
                });
            }

            // Function to render markdown content with animation
            function renderContent(index) {
                const page = pageData[index];
                heroSubtitle.textContent = page.title;
                
                // Reset animation
                contentBody.style.animation = 'none';
                contentBody.offsetHeight; // Trigger reflow
                contentBody.style.animation = null; 
                
                contentBody.innerHTML = marked.parse(page.content);
                
                if (page.isQA) {
                    renderQA();
                }
            }

            // Initial render
            renderContent(0);
        });
    </script>
</body>
</html>
