<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學與地球內部結構 - 互動學習筆記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #38bdf8;
            --secondary-color: #f59e0b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { color: var(--accent-color); font-size: 1.5rem; }

        .nav-links { list-style: none; padding: 1rem; }
        .nav-item {
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .nav-item:hover, .nav-item.active {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
        }
        .qa-tab { border: 1px dashed var(--secondary-color); margin-top: 2rem; }

        /* Main Content */
        .main-content { margin-left: 300px; flex: 1; width: 100%; }
        .hero {
            height: 300px;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            padding: 0 4rem;
        }
        .content-wrapper { padding: 3rem 4rem; max-width: 1000px; margin: 0 auto; }

        /* Humor Cards & Gallery */
        .humor-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }
        .humor-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }
        .humor-card:hover { transform: translateY(-5px); }
        .humor-img-wrapper img { width: 100%; height: 200px; object-fit: cover; }
        .humor-text { padding: 1.5rem; }
        .humor-text h4 { color: var(--secondary-color); margin-bottom: 10px; }

        /* Q&A Cards */
        .qa-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 2rem; }
        .card-scene { perspective: 1000px; height: 250px; }
        .card {
            width: 100%; height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 15px; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .card-front { background: #334155; border: 2px solid var(--accent-color); }
        .card-back { background: #0f172a; border: 2px solid var(--secondary-color); transform: rotateY(180deg); }
        .chapter-badge { background: var(--accent-color); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 10px; }

        /* SVG Animation Area */
        .interactive-explanation {
            background: rgba(15, 23, 42, 0.5);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--accent-color);
            margin: 2rem 0;
        }

        /* Mobile Toggle */
        .mobile-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: var(--accent-color); color: #000; border: none;
            width: 50px; height: 50px; border-radius: 50%; z-index: 2000;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-toggle { display: block; }
            .hero { padding: 0 2rem; }
            .content-wrapper { padding: 2rem; }
        }
    </style>
</head>
<body>

    <button class="mobile-toggle" id="mobileToggle">☰</button>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Seismology</h2>
                <p>Chapter 3: Earth Structure</p>
            </div>
            <ul class="nav-links" id="navLinks"></ul>
        </aside>

        <main class="main-content">
            <section class="hero">
                <div class="hero-content">
                    <h1 id="heroTitle">地震波與地球內部結構</h1>
                    <p id="heroSubtitle">探索地球深處的奧秘</p>
                </div>
            </section>

            <div class="content-wrapper">
                <div class="markdown-body" id="contentBody"></div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script>
        // 這部分原本是由你的 Python 產生的 data.js 內容
        const pageData = [
            {
                "id": "3.1",
                "title": "3.1 Introduction",
                "content": "# 3.1 緒論\n地震學是研究地球內部的最強工具。透過 P 波與 S 波在不同介面的反應，我們可以精確得知地球的分層構造。"
            },
            {
                "id": "3.2",
                "title": "3.2 Refraction Seismology",
                "content": "# 3.2 震測折射法\n利用臨界折射波（頭波）來偵測地下地層的深度與速度。這是發現 Moho 面的關鍵技術。"
            },
            {
                "id": "3.3",
                "title": "3.3 Reflection Seismology",
                "content": "# 3.3 震測反射法\n主要用於地殼淺層與油氣探勘。透過 NMO 校正與 Stacking 增強訊號。"
            },
            {
                "id": "3.4",
                "title": "3.4 Spherical Earth",
                "content": "# 3.4 球狀地球模型\n在大尺度下必須考慮地球曲率，射線參數 $p = (r \\sin i)/v$ 維持不變。"
            },
            {
                "id": "3.5",
                "title": "3.5 Body Waves",
                "content": "# 3.5 體波走時研究\n研究不同震相（如 PcP, PKIKP）來界定地函與地核的邊界。"
            },
            {
                "id": "qa_assessment",
                "title": "成果驗收 (Q&A)",
                "content": "<div id='qa-section-container'></div>",
                "isQA": true
            }
        ];

        // 模擬 Python 注入的圖片與動畫資料
        const humorData = {
            "3.2": [
                { img: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-1.png?raw=true", title: "🏃‍♂️ 震波賽跑", desc: "直達波走捷徑但路況差，頭波先往下鑽到高速公路狂飆再上來。" },
                { img: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-19.png?raw=true", title: "🥷 隱藏層", desc: "如果下面那層比較慢，波進去就不會產生頭波，直接神隱了！" }
            ],
            "3.5": [
                { img: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.5-12.png?raw=true", title: "🌑 地核陰影區", desc: "因為液態外核波速太慢，把 P 波都折射偏折走了。" }
            ]
        };

        const svgAnim = `
        <div class="interactive-explanation">
            <h3>✨ 動態圖解：頭波的誕生</h3>
            <svg viewBox="0 0 400 200" style="width:100%; max-width:500px; background: #0f172a; border-radius: 12px; display: block; margin: auto;">
                <rect x="0" y="0" width="400" height="100" fill="#1e293b"/>
                <circle cx="50" cy="50" r="5" fill="#f97316"><animate attributeName="r" values="5;10;5" dur="2s" repeatCount="indefinite"/></circle>
                <path d="M 50 50 L 150 100" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 5"/>
                <path d="M 150 100 L 300 100" stroke="#f97316" stroke-width="3"><animate attributeName="stroke-dasharray" values="0,150;150,0" dur="2s" repeatCount="indefinite"/></path>
                <path d="M 250 100 L 350 50" stroke="#10b981" stroke-width="2" stroke-dasharray="5 5"/>
            </svg>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">橘色為頭波，在高速層介面疾馳並向上傳遞能量。</p>
        </div>`;

        const qaData = [
            { chapter: "3.2", question: "什麼是 Moho 面？", answer: "地殼與地函的交界，由莫荷洛維奇發現，波速在此顯著增加。" },
            { chapter: "3.4", question: "球狀地球的射線守恆量是？", answer: "射線參數 p = (r * sin i) / v。" },
            { chapter: "3.5", question: "為何有 P 波陰影區？", answer: "因為地核波速低於地函，產生強烈的向內折射。" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const nav = document.getElementById('navLinks');
            const body = document.getElementById('contentBody');
            const mobileBtn = document.getElementById('mobileToggle');
            const sidebar = document.getElementById('sidebar');

            mobileBtn.onclick = () => sidebar.classList.toggle('open');

            pageData.forEach((page, idx) => {
                const li = document.createElement('li');
                li.className = `nav-item ${idx === 0 ? 'active' : ''} ${page.isQA ? 'qa-tab' : ''}`;
                li.innerHTML = `<span>${page.title}</span>`;
                li.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    li.classList.add('active');
                    render(idx);
                    if(window.innerWidth < 768) sidebar.classList.remove('open');
                };
                nav.appendChild(li);
            });

            function render(idx) {
                const page = pageData[idx];
                let html = marked.parse(page.content);

                // 注入圖片與動畫
                if(page.id === "3.2") html += svgAnim;
                if(humorData[page.id]) {
                    html += '<div class="humor-gallery">';
                    humorData[page.id].forEach(item => {
                        html += `
                        <div class="humor-card">
                            <div class="humor-img-wrapper"><img src="${item.img}"></div>
                            <div class="humor-text"><h4>${item.title}</h4><p>${item.desc}</p></div>
                        </div>`;
                    });
                    html += '</div>';
                }

                body.innerHTML = html;
                if(page.isQA) renderQA();
                document.getElementById('heroSubtitle').textContent = page.title;
                window.scrollTo(0,0);
            }

            function renderQA() {
                const container = document.getElementById('qa-section-container');
                container.innerHTML = `<div class="qa-grid" id="qaGrid"></div>`;
                const grid = document.getElementById('qaGrid');
                qaData.forEach(item => {
                    const scene = document.createElement('div');
                    scene.className = 'card-scene';
                    scene.innerHTML = `
                        <div class="card" onclick="this.classList.toggle('is-flipped')">
                            <div class="card-face card-front">
                                <span class="chapter-badge">${item.chapter}</span>
                                <h3>${item.question}</h3>
                                <p style="font-size:0.7rem; margin-top:10px;">點擊翻面</p>
                            </div>
                            <div class="card-face card-back">
                                <p>${item.answer}</p>
                            </div>
                        </div>`;
                    grid.appendChild(scene);
                });
            }

            render(0); // 預設載入第一頁
        });
    </script>
</body>
</html>
