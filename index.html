<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學第三章：地球內部結構大解密</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        /* 修正 MathJax 或特殊字體需求 */
        .font-serif { font-family: Georgia, Cambria, "Times New Roman", Times, serif; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // 從 LucideReact 全域變數中取得圖示
        const { 
            Activity, BookOpen, Brain, CheckCircle, ChevronRight, 
            HelpCircle, AlertCircle, Info, Zap 
        } = LucideReact;

        const IMAGES = {
            fig3_2_1: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-1.png?raw=true",
            fig3_2_2: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-2.png?raw=true",
            fig3_2_5: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-5.png?raw=true",
            fig3_2_6: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-6.png?raw=true",
            fig3_2_12: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-12.png?raw=true",
            fig3_2_13: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-13.png?raw=true",
            fig3_2_19: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.2-19.png?raw=true",
            fig3_3_10: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.3-10.png?raw=true",
            fig3_3_24: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.3-24.png?raw=true",
            fig3_3_26: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.3-26.png?raw=true",
            fig3_4_2: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.4-2.png?raw=true",
            fig3_4_5: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.4-5.png?raw=true",
            fig3_4_6: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.4-6.png?raw=true",
            fig3_4_7: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.4-7.png?raw=true",
            fig3_5_2: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.5-2.png?raw=true",
            fig3_5_5: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.5-5.png?raw=true",
            fig3_5_12: "https://github.com/Icon826/seismology_ch3/blob/main/Fig.3.5-12.png?raw=true"
        };

        const TeacherBubble = ({ children, title = "導師碎碎念" }) => (
            <div className="flex items-start gap-4 my-6 bg-blue-50 p-6 rounded-2xl shadow-sm border border-blue-100 relative overflow-hidden">
                <div className="absolute -right-4 -top-4 text-blue-100 opacity-50">
                    <Brain size={100} />
                </div>
                <div className="flex-shrink-0 bg-blue-500 text-white p-3 rounded-full shadow-md z-10">
                    <BookOpen size={24} />
                </div>
                <div className="z-10">
                    <h4 className="font-bold text-blue-800 mb-2">{title}</h4>
                    <div className="text-gray-700 leading-relaxed space-y-2">{children}</div>
                </div>
            </div>
        );

        const CheckIn = ({ question, answer, onReveal }) => {
            const [revealed, setRevealed] = useState(false);
            return (
                <div className="bg-amber-50 border-l-4 border-amber-400 p-5 my-6 rounded-r-xl shadow-sm">
                    <div className="flex items-center gap-2 text-amber-800 font-bold mb-3">
                        <HelpCircle size={20} />
                        <span>這部分還可以嗎？你的大腦還在線上嗎？</span>
                    </div>
                    <p className="text-gray-700 mb-4 font-medium">{question}</p>
                    {!revealed ? (
                        <button 
                            onClick={() => { setRevealed(true); if(onReveal) onReveal(); }}
                            className="bg-amber-100 hover:bg-amber-200 text-amber-800 px-4 py-2 rounded-lg font-medium transition-colors text-sm"
                        >
                            點我看解答！
                        </button>
                    ) : (
                        <div className="bg-white p-4 rounded-lg text-gray-700 shadow-inner border border-amber-100 animate-fade-in">
                            <p><strong>導師解答：</strong> {answer}</p>
                        </div>
                    )}
                </div>
            );
        };

        const ImageFigure = ({ src, caption, alt }) => (
            <figure className="my-8 flex flex-col items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <img src={src} alt={alt || caption} className="max-w-full h-auto rounded-lg" loading="lazy" 
                     onError={(e) => { e.target.src = 'https://placehold.co/600x400?text=Image+Loading+Failed'; }} />
                <figcaption className="mt-3 text-sm text-gray-500 text-center font-medium border-t border-gray-100 pt-2 w-full">
                    {caption}
                </figcaption>
            </figure>
        );

        const Formula = ({ children }) => (
            <div className="bg-gray-800 text-green-400 p-4 rounded-xl font-mono text-center my-4 overflow-x-auto shadow-inner text-lg">
                {children}
            </div>
        );

        const QuizSection = () => {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);

            const questions = [
                {
                    q: "當地震波往下傳遞，遇到一個「波速更快」的地層，且以「臨界角」入射時，會產生什麼波？",
                    opts: ["直達波 (Direct Wave)", "首波 (Head Wave)", "表面波 (Surface Wave)", "超音波 (Ultrasound)"],
                    ans: 1,
                    exp: "答對啦！這就像是在沙灘上跑步的人，突然決定斜切到旁邊的柏油路上跑，然後再不斷發射能量回到沙灘上。這就是聰明的「首波」！"
                },
                {
                    q: "在「球狀地球」模型中，射線參數 (Ray Parameter, p) 的公式是什麼？",
                    opts: ["p = sin(i) / v", "p = r × sin(i) / v", "p = v / sin(i)", "p = m × c²"],
                    ans: 1,
                    exp: "沒錯！因為地球是圓的，我們不能只看角度，還要把到地心的距離 (r) 算進去。就像花式溜冰選手旋轉時，手臂收合會影響轉速一樣，這是一個守恆量喔！"
                },
                {
                    q: "關於品質因子 (Quality Factor, Q)，下列哪句話是正確的？",
                    opts: ["Q 值越高，代表地震波能量衰減越快。", "敲擊大布丁的 Q 值比敲擊金屬鐘的 Q 值高。", "Q 值越高，代表介質越接近完美的彈性體，能量耗損越少。", "Q 值只跟波的顏色有關。"],
                    ans: 2,
                    exp: "太棒了！Q 值就像是「彈性優良指數」。高 Q 值代表能量幾乎不耗損（像金屬鐘一直響），低 Q 值則代表能量很快被吸走（像敲布丁噗一聲就沒了）。"
                },
                {
                    q: "在地函中，波速突然隨深度急遽增加（例如橄欖石相變），會導致走時曲線上出現什麼形狀的特徵？",
                    opts: ["完美的圓形", "字母 'Z' 形狀的三分支效應 (Triplication)", "一條水平直線", "波浪狀"],
                    ans: 1,
                    exp: "完全正確！因為波速突然跳升，導致在某些距離下，地震儀會同時接收到走不同路徑的波，在走時圖上看起來就像一個 'Z' 字型的折疊，我們稱之為「三分支效應」。"
                }
            ];

            const handleSelect = (idx) => {
                if (showExplanation) return;
                setSelectedOpt(idx);
                setShowExplanation(true);
                if (idx === questions[currentQ].ans) {
                    setScore(score + 1);
                }
            };

            const nextQ = () => {
                setSelectedOpt(null);
                setShowExplanation(false);
                if (currentQ < questions.length - 1) {
                    setCurrentQ(currentQ + 1);
                } else {
                    setShowResult(true);
                }
            };

            if (showResult) {
                return (
                    <div className="bg-white p-8 rounded-2xl shadow-lg text-center border-t-8 border-green-500">
                        <Activity size={64} className="mx-auto text-green-500 mb-4" />
                        <h3 className="text-3xl font-bold text-gray-800 mb-2">測驗完成！</h3>
                        <p className="text-xl text-gray-600 mb-6">你的得分：<span className="font-bold text-blue-600">{score} / {questions.length}</span></p>
                        {score === questions.length ? (
                            <p className="text-green-600 font-medium">太神啦！你簡直是行走的地震儀，第三章的精華你都吸收了！🎉</p>
                        ) : score >= 2 ? (
                            <p className="text-blue-600 font-medium">表現不錯喔！觀念大致都有掌握，再去複習一下錯的題目就完美了！👍</p>
                        ) : (
                            <p className="text-amber-600 font-medium">看來有些觀念還在「低速帶」裡迷路喔！沒關係，多看幾次導師的解說，你一定會懂的！💪</p>
                        )}
                        <button onClick={() => {setCurrentQ(0); setScore(0); setShowResult(false);}} className="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full transition-colors">
                            再挑戰一次
                        </button>
                    </div>
                );
            }

            const q = questions[currentQ];

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                            <Zap className="text-yellow-500" /> 成果驗收時間！
                        </h3>
                        <span className="bg-blue-100 text-blue-800 py-1 px-3 rounded-full font-bold text-sm">
                            題號 {currentQ + 1} / {questions.length}
                        </span>
                    </div>
                    
                    <p className="text-lg font-medium text-gray-700 mb-6">{q.q}</p>
                    
                    <div className="space-y-3">
                        {q.opts.map((opt, idx) => {
                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all ";
                            if (!showExplanation) {
                                btnClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700";
                            } else {
                                if (idx === q.ans) {
                                    btnClass += "border-green-500 bg-green-50 text-green-800 font-bold";
                                } else if (idx === selectedOpt) {
                                    btnClass += "border-red-500 bg-red-50 text-red-800";
                                } else {
                                    btnClass += "border-gray-200 text-gray-400 opacity-50";
                                }
                            }

                            return (
                                <button key={idx} disabled={showExplanation} onClick={() => handleSelect(idx)} className={btnClass}>
                                    <div className="flex items-center justify-between">
                                        <span>{opt}</span>
                                        {showExplanation && idx === q.ans && <CheckCircle className="text-green-500" />}
                                    </div>
                                </button>
                            );
                        })}
                    </div>

                    {showExplanation && (
                        <div className="mt-6 animate-fade-in">
                            <div className={`p-4 rounded-xl mb-6 ${selectedOpt === q.ans ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                <p className="font-bold mb-1">{selectedOpt === q.ans ? '🎉 答對囉！' : '😅 哎呀，差一點！'}</p>
                                <p className="text-sm">{q.exp}</p>
                            </div>
                            <button onClick={nextQ} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                {currentQ === questions.length - 1 ? '看成績' : '下一題'} <ChevronRight size={20} />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            return (
                <div className="min-h-screen bg-slate-50 font-sans text-gray-800 pb-20">
                    <header className="bg-gradient-to-br from-blue-900 to-indigo-800 text-white pt-20 pb-16 px-6 text-center shadow-md">
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 animate-fade-in">
                            地震學第三章：地球內部結構大解密
                        </h1>
                        <p className="text-xl md:text-2xl text-blue-200 max-w-3xl mx-auto font-medium">
                            別擔心公式太可怕，你的專屬導師帶你用最白話的方式，看透地球的內心戲！
                        </p>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 sm:px-6 -mt-8 space-y-12 relative z-10">
                        <section className="bg-white p-6 md:p-10 rounded-2xl shadow-lg border border-gray-100">
                            <h2 className="text-3xl font-bold text-blue-900 border-b-2 border-blue-100 pb-4 mb-6">1. 導言：醫生有 X 光，我們有地震波！</h2>
                            <TeacherBubble title="導師開場白">
                                <p>想像一下，如果你想知道一顆大西瓜熟了沒，你會怎麼做？沒錯，敲一敲它聽聲音！</p>
                                <p>地球物理學家也是一樣的。我們沒辦法把地球切開來看，所以我們利用地震產生的「震波」，聽聽它們穿過地球內部的「聲音」。</p>
                                <p>P波就像是你在排隊時，後面的人突然推你一把；而 S波就像是你拿著繩子甩。最酷的是，S波沒辦法穿過液體！這就是我們發現外地核是液態的關鍵證據！</p>
                            </TeacherBubble>
                            <CheckIn 
                                question="為什麼我們說地震波的解析度比重力或磁力探勘還要好？"
                                answer="因為地震波就像超音波掃描，可以直接告訴我們介面的精確深度，以及兩側物質屬性的劇烈變化！"
                            />
                        </section>

                        <section className="bg-white p-6 md:p-10 rounded-2xl shadow-lg border border-gray-100">
                            <h2 className="text-3xl font-bold text-blue-900 border-b-2 border-blue-100 pb-4 mb-6">2. 震測折射法：跑得快的人先到！</h2>
                            <ImageFigure src={IMAGES.fig3_2_1} caption="圖 3.2-1：平坦地層模型與三種基本射線路徑（直達波、反射波、首波）" />
                            <TeacherBubble title="聰明的首波 (Head wave)">
                                <p>在過了「交叉距離」後，繞遠路但走在高速層的首波反而會超越直達波，成為第一名！</p>
                            </TeacherBubble>
                            <ImageFigure src={IMAGES.fig3_2_2} caption="圖 3.2-2：直達波、反射波與首波的走時曲線。" />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <ImageFigure src={IMAGES.fig3_2_12} caption="圖 3.2-12：盲區 (Blind Zone)。" />
                                <ImageFigure src={IMAGES.fig3_2_13} caption="圖 3.2-13：低速帶導致波往下偏折。" />
                            </div>
                        </section>

                        <section className="bg-white p-6 md:p-10 rounded-2xl shadow-lg border border-gray-100">
                            <h2 className="text-3xl font-bold text-blue-900 border-b-2 border-blue-100 pb-4 mb-6">3. 震測反射法：聽回音找寶藏</h2>
                            <TeacherBubble title="找石油的最佳利器">
                                <p>反射法就像對著地下大喊聽「回音」。我們用 NMO 校正把時間拉平並疊加，讓地下的影像變得清晰無比。</p>
                            </TeacherBubble>
                            <ImageFigure src={IMAGES.fig3_3_10} caption="圖 3.3-10：NMO 校正與疊加過程。" />
                        </section>

                        <section className="bg-white p-6 md:p-10 rounded-2xl shadow-lg border border-gray-100">
                            <h2 className="text-3xl font-bold text-blue-900 border-b-2 border-blue-100 pb-4 mb-6">4. 球狀地球與體波：地球才不是平的！</h2>
                            <Formula>p = (r × sin(i)) / v = 常數</Formula>
                            <ImageFigure src={IMAGES.fig3_4_2} caption="圖 3.4-2：球狀地球中的射線路徑。" />
                            <div className="flex flex-col md:flex-row gap-6">
                                <ImageFigure src={IMAGES.fig3_5_2} caption="圖 3.5-2：各種複雜震相傳播路徑。" />
                                <ImageFigure src={IMAGES.fig3_5_12} caption="圖 3.5-12：地函三分支效應 (Triplication)。" />
                            </div>
                        </section>

                        <section id="quiz">
                            <QuizSection />
                        </section>
                    </main>

                    <footer className="mt-16 text-center text-gray-500 text-sm">
                        <p>地震學課程 第三章互動教材 © 2026</p>
                        <p className="mt-1">Generated by Your Friendly AI Tutor</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
